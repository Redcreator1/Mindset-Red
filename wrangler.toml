# Cloudflare Workers deployment for mindset-ctx (hosted funnel).
# Deploy: pushed automatically by .github/workflows/deploy-cloudflare.yml on
# every push to main. Runtime state lives in the CTX_KV namespace; Stripe
# secrets are set as encrypted vars via `wrangler secret put` from CI.

name = "mindset-ctx"
main = "src/worker/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# CTX_BASE_URL must be an absolute URL — Stripe rejects relative
# success_url/cancel_url values on Checkout Sessions. Confirmed via the
# first successful deploy's *.workers.dev subdomain; update this if you
# bind a custom domain instead.
[vars]
CTX_BASE_URL = "https://mindset-ctx.mindsetredcom.workers.dev"

# KV namespace holding tenants + daily usage counters.
# Created out-of-band once (via the Cloudflare dashboard or MCP connector).
[[kv_namespaces]]
binding = "CTX_KV"
id = "fb712ab4857d4e74bf99e766197c8208"
