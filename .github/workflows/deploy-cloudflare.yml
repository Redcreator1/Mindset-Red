name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }

      - run: npm ci

      - name: Push runtime secrets to the Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          put() { echo "$2" | npx --yes wrangler@3 secret put "$1"; }
          put CTX_STRIPE_API_KEY "${{ secrets.CTX_STRIPE_API_KEY }}"
          put CTX_STRIPE_SECRET  "${{ secrets.CTX_STRIPE_SECRET }}"
          put CTX_WEBHOOK_SECRET "${{ secrets.CTX_WEBHOOK_SECRET }}"
          put STRIPE_PRICE_MAP   '${{ secrets.STRIPE_PRICE_MAP }}'

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 deploy

      - name: Verify and show URLs
        run: |
          # Read straight from wrangler.toml — the deploy itself sets CTX_BASE_URL
          # from this same file, so there is no drift to guess around.
          URL=$(grep '^CTX_BASE_URL' wrangler.toml | cut -d'"' -f2)
          echo "Waiting for ${URL}/v1/health…"
          for i in $(seq 1 20); do
            if curl -fsS "${URL}/v1/health" | grep -q '"ok": true'; then
              echo "✅ Live at ${URL}"
              echo "   Pricing:   ${URL}/pricing"
              echo "   Dashboard: ${URL}/v1/dashboard"
              echo "   Webhook:   ${URL}/v1/stripe/webhook  (add this in Stripe Dashboard, or run the"
              echo "              'Stripe — bootstrap webhook' workflow to create it automatically)"
              echo "   GH App:    ${URL}/v1/app/manifest  (POST to https://github.com/settings/apps/new to create)"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Health check timed out — deploy may still be propagating; check ${URL}/v1/health manually."
          exit 1
