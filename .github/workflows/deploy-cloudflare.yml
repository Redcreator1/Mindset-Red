name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }

      - run: npm ci

      - name: Ensure KV namespace CTX_KV exists (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Fetch existing namespaces.
          NS=$(npx --yes wrangler@3 kv namespace list 2>/dev/null || echo "[]")
          ID=$(echo "$NS" | node -e "
            const list = JSON.parse(require('fs').readFileSync(0,'utf8'));
            const hit = list.find(n => n.title === 'mindset-ctx-CTX_KV');
            process.stdout.write(hit ? hit.id : '');
          ")
          if [ -z "$ID" ]; then
            echo "Creating KV namespace CTX_KV…"
            ID=$(npx --yes wrangler@3 kv namespace create CTX_KV --preview false 2>&1 \
                 | grep -oE 'id = "[a-f0-9]+"' | head -1 | cut -d'"' -f2)
          fi
          echo "KV_ID=$ID" >> $GITHUB_ENV
          echo "Using CTX_KV id: $ID"

      - name: Pin KV id into wrangler.toml
        run: |
          sed -i 's/id = "REPLACE_ME_AT_DEPLOY"/id = "'"$KV_ID"'"/' wrangler.toml
          grep -A2 kv_namespaces wrangler.toml

      - name: Push runtime secrets to the Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          put() { echo "$2" | npx --yes wrangler@3 secret put "$1"; }
          put CTX_STRIPE_API_KEY "${{ secrets.CTX_STRIPE_API_KEY }}"
          put CTX_STRIPE_SECRET  "${{ secrets.CTX_STRIPE_SECRET }}"
          put STRIPE_PRICE_MAP   '${{ secrets.STRIPE_PRICE_MAP }}'

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 deploy

      - name: Show URLs
        run: |
          NAME=$(grep '^name = ' wrangler.toml | cut -d'"' -f2)
          SUB="${{ secrets.CLOUDFLARE_WORKER_SUBDOMAIN }}"
          URL="https://${NAME}.${SUB}.workers.dev"
          echo "✅ Deployed to ${URL}"
          echo "   Pricing:   ${URL}/pricing"
          echo "   Health:    ${URL}/v1/health"
          echo "   Webhook:   ${URL}/v1/stripe/webhook  (add this in Stripe Dashboard)"
