name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          APP=$(grep '^app = ' fly.toml | cut -d'"' -f2)
          echo "App: $APP"
          flyctl apps show "$APP" 2>/dev/null \
            || flyctl apps create "$APP" --org personal

      - name: Ensure persistent volume exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          APP=$(grep '^app = ' fly.toml | cut -d'"' -f2)
          if ! flyctl volumes list -a "$APP" | grep -q ctx_data; then
            flyctl volumes create ctx_data --size 1 --region cdg -a "$APP" --yes
          fi

      - name: Sync runtime secrets to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl secrets set --stage \
            CTX_STRIPE_API_KEY="${{ secrets.CTX_STRIPE_API_KEY }}" \
            CTX_STRIPE_SECRET="${{ secrets.CTX_STRIPE_SECRET }}" \
            STRIPE_PRICE_MAP='${{ secrets.STRIPE_PRICE_MAP }}' \
            CTX_WEBHOOK_SECRET="${{ secrets.CTX_WEBHOOK_SECRET }}"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Verify health
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          APP=$(grep '^app = ' fly.toml | cut -d'"' -f2)
          URL="https://${APP}.fly.dev"
          echo "Waiting for ${URL}/v1/health..."
          for i in $(seq 1 30); do
            if curl -fsS "${URL}/v1/health" | grep -q '"ok": true'; then
              echo "✅ Live at ${URL}"
              echo "   Pricing:   ${URL}/pricing"
              echo "   Dashboard: ${URL}/v1/dashboard"
              echo "   Webhook:   ${URL}/v1/stripe/webhook"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Health check timed out"
          exit 1
